services:
  backend1:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=1
    networks:
      - lb-net

  backend2:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=2
    networks:
      - lb-net

  backend3:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=3
    networks:
      - lb-net

  nginx-lb:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - lb-net

networks:
  lb-net:
    driver: bridge