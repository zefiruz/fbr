services:
  backend1:
    build: ./backend
    environment:
      - PORT=3000
    networks:
      - lb-net

  backend2:
    build: ./backend
    environment:
      - PORT=3000
    networks:
      - lb-net

  backend3:
    build: ./backend
    environment:
      - PORT=3000
    networks:
      - lb-net

  nginx-lb:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - lb-net

  haproxy-lb:
    image: haproxy:latest
    ports:
      - "8081:80"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - backend1
      - backend2
    networks:
      - lb-net

networks:
  lb-net:
    driver: bridge