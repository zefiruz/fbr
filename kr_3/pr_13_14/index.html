<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- Для Android -->
    <meta name="mobile-web-app-capable" content="yes">
    <!-- Цвет темы для браузера -->
    <meta name="theme-color" content="#667eea">
    <!-- Для iOS (иконка на домашний экран) -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <!-- Для iOS (статус бар) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Заметки (13-18)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icons/icon-16x16.png" sizes="16x16" type="image/png">
</head>

<body>
    <div class="container">
        <h1>Заметки</h1>
        <form id="note-form">
            <input type="text" id="note-input" placeholder="Введите заметку" required>
            <button type="submit">Добавить</button>
        </form>
        <ul id="notes-list"></ul>
    </div>
    <script src="app.js"></script>
</body>

</html>
